<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#a87d1a"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6d15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield outer stroke -->
  <path d="M60 6 L104 24 L104 62 C104 84 84 102 60 114 C36 102 16 84 16 62 L16 24 Z"
        fill="url(#shieldGrad)" stroke="url(#rimGrad)" stroke-width="2.5"/>

  <!-- Inner shield rim -->
  <path d="M60 14 L97 29 L97 62 C97 80 80 96 60 107 C40 96 23 80 23 62 L23 29 Z"
        fill="none" stroke="#b91c1c" stroke-width="1" opacity="0.6"/>

  <!-- Hexagon grid accent top -->
  <polygon points="60,18 68,23 68,33 60,38 52,33 52,23"
           fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Crimson horizontal bar -->
  <rect x="24" y="55" width="72" height="2.5" fill="#b91c1c" opacity="0.8" rx="1"/>

  <!-- Main "OIA" text -->
  <text x="60" y="53" font-family="'Courier New', Courier, monospace"
        font-size="17" font-weight="900" fill="url(#goldGrad)"
        text-anchor="middle" letter-spacing="3" filter="url(#glow)">O.I.A.</text>

  <!-- Sub text -->
  <text x="60" y="71" font-family="'Courier New', Courier, monospace"
        font-size="5.2" font-weight="700" fill="#94a3b8"
        text-anchor="middle" letter-spacing="2.5">OTAKU INTL. AGENCY</text>

  <!-- Bottom badge number / ref -->
  <text x="60" y="92" font-family="'Courier New', Courier, monospace"
        font-size="4.5" fill="#d4af37" text-anchor="middle" letter-spacing="1.5" opacity="0.7">
    AUTH-CLASS: ALPHA
  </text>

  <!-- Corner rivets -->
  <circle cx="32" cy="30" r="2" fill="#d4af37" opacity="0.5"/>
  <circle cx="88" cy="30" r="2" fill="#d4af37" opacity="0.5"/>

  <!-- Bottom laurel lines -->
  <line x1="30" y1="80" x2="44" y2="80" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
  <line x1="76" y1="80" x2="90" y2="80" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
  <circle cx="60" cy="80" r="1.5" fill="#d4af37" opacity="0.5"/>
</svg>
